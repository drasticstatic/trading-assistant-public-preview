<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!--
      16 rainbow petal gradients — radial, bright spine near TIP (cy=12%),
      full saturation mid, near-black at base. Creates convex emboss + dark center.
      Colors rotate through full spectrum going clockwise.
    -->
    <radialGradient id="p1"  cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FF88BB"/><stop offset="42%" stop-color="#FF0066"/><stop offset="100%" stop-color="#180010"/>
    </radialGradient>
    <radialGradient id="p2"  cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FF9988"/><stop offset="42%" stop-color="#FF2200"/><stop offset="100%" stop-color="#1A0400"/>
    </radialGradient>
    <radialGradient id="p3"  cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFBB88"/><stop offset="42%" stop-color="#FF6500"/><stop offset="100%" stop-color="#1A0C00"/>
    </radialGradient>
    <radialGradient id="p4"  cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFD888"/><stop offset="42%" stop-color="#FFAA00"/><stop offset="100%" stop-color="#1A1100"/>
    </radialGradient>
    <radialGradient id="p5"  cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#EEFF88"/><stop offset="42%" stop-color="#CCEE00"/><stop offset="100%" stop-color="#141400"/>
    </radialGradient>
    <radialGradient id="p6"  cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#BBFF88"/><stop offset="42%" stop-color="#66EE00"/><stop offset="100%" stop-color="#0A1400"/>
    </radialGradient>
    <radialGradient id="p7"  cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#88FFAA"/><stop offset="42%" stop-color="#00CC44"/><stop offset="100%" stop-color="#001408"/>
    </radialGradient>
    <radialGradient id="p8"  cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#88FFDD"/><stop offset="42%" stop-color="#00FFAA"/><stop offset="100%" stop-color="#001714"/>
    </radialGradient>
    <radialGradient id="p9"  cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#88FFFF"/><stop offset="42%" stop-color="#00EEDD"/><stop offset="100%" stop-color="#001616"/>
    </radialGradient>
    <radialGradient id="p10" cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#88EEFF"/><stop offset="42%" stop-color="#00AAEE"/><stop offset="100%" stop-color="#001218"/>
    </radialGradient>
    <radialGradient id="p11" cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#88BBFF"/><stop offset="42%" stop-color="#0066FF"/><stop offset="100%" stop-color="#00091A"/>
    </radialGradient>
    <radialGradient id="p12" cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#9988FF"/><stop offset="42%" stop-color="#3300FF"/><stop offset="100%" stop-color="#04001A"/>
    </radialGradient>
    <radialGradient id="p13" cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#CC88FF"/><stop offset="42%" stop-color="#7700EE"/><stop offset="100%" stop-color="#0C001A"/>
    </radialGradient>
    <radialGradient id="p14" cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#EE88FF"/><stop offset="42%" stop-color="#BB00FF"/><stop offset="100%" stop-color="#160019"/>
    </radialGradient>
    <radialGradient id="p15" cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FF88FF"/><stop offset="42%" stop-color="#EE00EE"/><stop offset="100%" stop-color="#180018"/>
    </radialGradient>
    <radialGradient id="p16" cx="50%" cy="12%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FF88CC"/><stop offset="42%" stop-color="#FF0099"/><stop offset="100%" stop-color="#1A000F"/>
    </radialGradient>

    <!-- Raised emboss: physical drop shadow under each petal -->
    <filter id="up" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0.6" dy="1.1" stdDeviation="1.4" flood-color="#000" flood-opacity="0.65"/>
    </filter>

    <!-- Dark smear under {··} — blurred dark fill of the glyph shapes -->
    <filter id="smear" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <!-- Rainbow for {··} center — same spectrum as petals -->
    <linearGradient id="rL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF4D6D"/>
      <stop offset="14%"  stop-color="#FF8C42"/>
      <stop offset="30%"  stop-color="#FFD166"/>
      <stop offset="48%"  stop-color="#06D6A0"/>
      <stop offset="65%"  stop-color="#4CC9F0"/>
      <stop offset="82%"  stop-color="#7B2FBE"/>
      <stop offset="100%" stop-color="#F72585"/>
    </linearGradient>
    <linearGradient id="rR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F72585"/>
      <stop offset="40%"  stop-color="#4CC9F0"/>
      <stop offset="100%" stop-color="#FF4D6D"/>
    </linearGradient>

    <!-- {··} glow -->
    <filter id="cg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    ═══════════════════════════════════════════════════
    16 RAINBOW PETALS — wavy ink-splatter flame shapes.

    Each petal starts from center (base at origin), fans out wide (~±18-24px
    at mid-radius), then tapers to an ink-drip tip at r≈68-74 that reaches
    the corners of the viewbox (corner distance = 70.7px from center 50,50).

    Angles are slightly irregular for organic paint-splatter feel.
    Colors rotate through full rainbow spectrum.

    Path local coords: base near (0,0), tip at y ≈ −68 to −74.
    Transform: translate(50,50) rotate(A) — no radial offset, petals grow from center.
    ═══════════════════════════════════════════════════

    Petal variants (4 shapes for organic variety):
    A: M 3,4 C 20,-12 24,-38 17,-54 Q 9,-64 3,-68 Q 0,-72 -3,-68 Q -9,-64 -17,-54 C -24,-38 -20,-12 -3,4 Z
    B: M 4,4 C 24,-10 28,-36 20,-53 Q 11,-63 4,-68 Q 0,-73 -4,-68 Q -11,-63 -20,-53 C -28,-36 -24,-10 -4,4 Z
    C: M 2,4 C 16,-14 19,-40 13,-56 Q 7,-66 2,-70 Q 0,-74 -2,-70 Q -7,-66 -13,-56 C -19,-40 -16,-14 -2,4 Z
    D: M 5,4 C 22,-10 26,-34 19,-51 Q 11,-62 4,-66 Q 0,-70 -4,-66 Q -11,-62 -19,-51 C -26,-34 -22,-10 -5,4 Z
  -->

  <!-- 1. 5° — Hot Pink/Crimson — A -->
  <g transform="translate(50,50) rotate(5)" filter="url(#up)">
    <path d="M 3,4 C 20,-12 24,-38 17,-54 Q 9,-64 3,-68 Q 0,-72 -3,-68 Q -9,-64 -17,-54 C -24,-38 -20,-12 -3,4 Z" fill="url(#p1)"/>
  </g>
  <!-- 2. 27° — Red — B -->
  <g transform="translate(50,50) rotate(27)" filter="url(#up)">
    <path d="M 4,4 C 24,-10 28,-36 20,-53 Q 11,-63 4,-68 Q 0,-73 -4,-68 Q -11,-63 -20,-53 C -28,-36 -24,-10 -4,4 Z" fill="url(#p2)"/>
  </g>
  <!-- 3. 48° — Orange — C -->
  <g transform="translate(50,50) rotate(48)" filter="url(#up)">
    <path d="M 2,4 C 16,-14 19,-40 13,-56 Q 7,-66 2,-70 Q 0,-74 -2,-70 Q -7,-66 -13,-56 C -19,-40 -16,-14 -2,4 Z" fill="url(#p3)"/>
  </g>
  <!-- 4. 71° — Amber — A -->
  <g transform="translate(50,50) rotate(71)" filter="url(#up)">
    <path d="M 3,4 C 20,-12 24,-38 17,-54 Q 9,-64 3,-68 Q 0,-72 -3,-68 Q -9,-64 -17,-54 C -24,-38 -20,-12 -3,4 Z" fill="url(#p4)"/>
  </g>
  <!-- 5. 91° — Yellow — D -->
  <g transform="translate(50,50) rotate(91)" filter="url(#up)">
    <path d="M 5,4 C 22,-10 26,-34 19,-51 Q 11,-62 4,-66 Q 0,-70 -4,-66 Q -11,-62 -19,-51 C -26,-34 -22,-10 -5,4 Z" fill="url(#p5)"/>
  </g>
  <!-- 6. 113° — Chartreuse — B -->
  <g transform="translate(50,50) rotate(113)" filter="url(#up)">
    <path d="M 4,4 C 24,-10 28,-36 20,-53 Q 11,-63 4,-68 Q 0,-73 -4,-68 Q -11,-63 -20,-53 C -28,-36 -24,-10 -4,4 Z" fill="url(#p6)"/>
  </g>
  <!-- 7. 134° — Green — A -->
  <g transform="translate(50,50) rotate(134)" filter="url(#up)">
    <path d="M 3,4 C 20,-12 24,-38 17,-54 Q 9,-64 3,-68 Q 0,-72 -3,-68 Q -9,-64 -17,-54 C -24,-38 -20,-12 -3,4 Z" fill="url(#p7)"/>
  </g>
  <!-- 8. 157° — Spring Green — C -->
  <g transform="translate(50,50) rotate(157)" filter="url(#up)">
    <path d="M 2,4 C 16,-14 19,-40 13,-56 Q 7,-66 2,-70 Q 0,-74 -2,-70 Q -7,-66 -13,-56 C -19,-40 -16,-14 -2,4 Z" fill="url(#p8)"/>
  </g>
  <!-- 9. 178° — Teal — D -->
  <g transform="translate(50,50) rotate(178)" filter="url(#up)">
    <path d="M 5,4 C 22,-10 26,-34 19,-51 Q 11,-62 4,-66 Q 0,-70 -4,-66 Q -11,-62 -19,-51 C -26,-34 -22,-10 -5,4 Z" fill="url(#p9)"/>
  </g>
  <!-- 10. 200° — Cyan — A -->
  <g transform="translate(50,50) rotate(200)" filter="url(#up)">
    <path d="M 3,4 C 20,-12 24,-38 17,-54 Q 9,-64 3,-68 Q 0,-72 -3,-68 Q -9,-64 -17,-54 C -24,-38 -20,-12 -3,4 Z" fill="url(#p10)"/>
  </g>
  <!-- 11. 222° — Blue — B -->
  <g transform="translate(50,50) rotate(222)" filter="url(#up)">
    <path d="M 4,4 C 24,-10 28,-36 20,-53 Q 11,-63 4,-68 Q 0,-73 -4,-68 Q -11,-63 -20,-53 C -28,-36 -24,-10 -4,4 Z" fill="url(#p11)"/>
  </g>
  <!-- 12. 244° — Deep Blue — C -->
  <g transform="translate(50,50) rotate(244)" filter="url(#up)">
    <path d="M 2,4 C 16,-14 19,-40 13,-56 Q 7,-66 2,-70 Q 0,-74 -2,-70 Q -7,-66 -13,-56 C -19,-40 -16,-14 -2,4 Z" fill="url(#p12)"/>
  </g>
  <!-- 13. 265° — Indigo — A -->
  <g transform="translate(50,50) rotate(265)" filter="url(#up)">
    <path d="M 3,4 C 20,-12 24,-38 17,-54 Q 9,-64 3,-68 Q 0,-72 -3,-68 Q -9,-64 -17,-54 C -24,-38 -20,-12 -3,4 Z" fill="url(#p13)"/>
  </g>
  <!-- 14. 288° — Violet — D -->
  <g transform="translate(50,50) rotate(288)" filter="url(#up)">
    <path d="M 5,4 C 22,-10 26,-34 19,-51 Q 11,-62 4,-66 Q 0,-70 -4,-66 Q -11,-62 -19,-51 C -26,-34 -22,-10 -5,4 Z" fill="url(#p14)"/>
  </g>
  <!-- 15. 310° — Purple — B -->
  <g transform="translate(50,50) rotate(310)" filter="url(#up)">
    <path d="M 4,4 C 24,-10 28,-36 20,-53 Q 11,-63 4,-68 Q 0,-73 -4,-68 Q -11,-63 -20,-53 C -28,-36 -24,-10 -4,4 Z" fill="url(#p15)"/>
  </g>
  <!-- 16. 333° — Magenta — C -->
  <g transform="translate(50,50) rotate(333)" filter="url(#up)">
    <path d="M 2,4 C 16,-14 19,-40 13,-56 Q 7,-66 2,-70 Q 0,-74 -2,-70 Q -7,-66 -13,-56 C -19,-40 -16,-14 -2,4 Z" fill="url(#p16)"/>
  </g>

  <!-- ── SCATTER INK DRIP DOTS — corners + outer ring ── -->
  <!-- Top-left corner zone -->
  <circle cx="9"  cy="8"  r="2.2" fill="#FF0066" opacity="0.9"/>
  <circle cx="15" cy="4"  r="1.4" fill="#FF2200" opacity="0.8"/>
  <circle cx="5"  cy="17" r="1.6" fill="#BB00FF" opacity="0.8"/>
  <!-- Top-right corner zone -->
  <circle cx="91" cy="8"  r="2.2" fill="#FFAA00" opacity="0.9"/>
  <circle cx="85" cy="4"  r="1.4" fill="#FFD166" opacity="0.8"/>
  <circle cx="95" cy="17" r="1.6" fill="#88EE00" opacity="0.8"/>
  <!-- Bottom-right corner zone -->
  <circle cx="91" cy="92" r="2.2" fill="#00CCFF" opacity="0.9"/>
  <circle cx="96" cy="83" r="1.4" fill="#0066FF" opacity="0.8"/>
  <circle cx="84" cy="97" r="1.6" fill="#00FFAA" opacity="0.8"/>
  <!-- Bottom-left corner zone -->
  <circle cx="9"  cy="92" r="2.2" fill="#8800FF" opacity="0.9"/>
  <circle cx="4"  cy="83" r="1.4" fill="#FF0099" opacity="0.8"/>
  <circle cx="16" cy="97" r="1.6" fill="#EE00FF" opacity="0.8"/>
  <!-- Mid-edge dots -->
  <circle cx="50" cy="3"  r="1.8" fill="#FFD166" opacity="0.7"/>
  <circle cx="50" cy="97" r="1.8" fill="#4CC9F0" opacity="0.7"/>
  <circle cx="3"  cy="50" r="1.8" fill="#FF4D6D" opacity="0.7"/>
  <circle cx="97" cy="50" r="1.8" fill="#7B2FBE" opacity="0.7"/>

  <!-- ══════════════════════════════════════════
       AUGMENT {··} CENTER — large, spread wide.
       Dark smear layer first → rainbow symbol on top.
       ══════════════════════════════════════════ -->

  <!-- Dark smear: blurred silhouette creates readability on any background -->
  <g filter="url(#smear)" opacity="0.9">
    <path d="M 34,33 C 22,33 22,42 28,50 C 22,58 22,67 34,67"
          fill="none" stroke="#04040A" stroke-width="6" stroke-linecap="round"/>
    <path d="M 66,33 C 78,33 78,42 72,50 C 78,58 78,67 66,67"
          fill="none" stroke="#04040A" stroke-width="6" stroke-linecap="round"/>
    <circle cx="41" cy="50" r="7.5" fill="#04040A"/>
    <circle cx="59" cy="50" r="7.5" fill="#04040A"/>
  </g>

  <!-- Left brace { — large, spreading far left -->
  <path d="M 34,33 C 22,33 22,42 28,50 C 22,58 22,67 34,67"
        fill="none" stroke="url(#rL)" stroke-width="3.2"
        stroke-linecap="round" filter="url(#cg)"/>

  <!-- Right brace } — large, spreading far right -->
  <path d="M 66,33 C 78,33 78,42 72,50 C 78,58 78,67 66,67"
        fill="none" stroke="url(#rR)" stroke-width="3.2"
        stroke-linecap="round" filter="url(#cg)"/>

  <!-- Left eye · — spread wide -->
  <circle cx="41" cy="50" r="5" fill="url(#rL)" filter="url(#cg)"/>

  <!-- Right eye · — spread wide -->
  <circle cx="59" cy="50" r="5" fill="url(#rR)" filter="url(#cg)"/>

</svg>
