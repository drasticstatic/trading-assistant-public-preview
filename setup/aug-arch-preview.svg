<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Augment Architecture share preview</title>
  <desc id="desc">Preview card for the Augment Architecture HTML guide showing a centered three-line title, four core surfaces, shared machinery, and careful model-routing guidance.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="56" x2="1104" y2="574" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101a33"/>
      <stop offset="1" stop-color="#09111d"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="168" x2="1040" y2="486" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7cc2ff"/>
      <stop offset="0.34" stop-color="#6ee7f9"/>
      <stop offset="0.6" stop-color="#49d17d"/>
      <stop offset="0.82" stop-color="#b693ff"/>
      <stop offset="1" stop-color="#ff9dc1"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#060d18"/>
  <rect x="34" y="34" width="1132" height="562" rx="34" fill="url(#bg)" stroke="#253650" stroke-width="2"/>
  <circle cx="988" cy="126" r="126" fill="#7cc2ff" opacity="0.11" filter="url(#softGlow)"/>
  <circle cx="224" cy="520" r="142" fill="#b693ff" opacity="0.1" filter="url(#softGlow)"/>
  <circle cx="598" cy="86" r="96" fill="#49d17d" opacity="0.07" filter="url(#softGlow)"/>

  <text x="600" y="100" fill="#a9b6c8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3" text-anchor="middle">TRADING ASSISTANT · AUGMENT ARCHITECTURE FIELD GUIDE</text>
  <text x="600" y="176" fill="#f5f8ff" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" text-anchor="middle">Augment Architecture</text>
  <text x="600" y="222" fill="#6ee7f9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">explained like a field guide</text>
  <text x="600" y="258" fill="#ff9dc1" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">instead of a mystery box</text>
  <text x="600" y="296" fill="#c6d3e5" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle">Four surfaces, clearer roles, shared machinery, and careful model-routing language.</text>

  <rect x="88" y="334" width="236" height="98" rx="22" fill="#101b30" stroke="#355784"/>
  <rect x="344" y="334" width="236" height="98" rx="22" fill="#101d2a" stroke="#2d6c87"/>
  <rect x="600" y="334" width="236" height="98" rx="22" fill="#132117" stroke="#2d7a59"/>
  <rect x="856" y="334" width="256" height="98" rx="22" fill="#1a1430" stroke="#785fd7"/>

  <text x="206" y="370" fill="#7cc2ff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">SURFACE 1</text>
  <text x="206" y="404" fill="#f5f8ff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">VS Code Agent</text>

  <text x="462" y="370" fill="#6ee7f9" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">SURFACE 2</text>
  <text x="462" y="404" fill="#f5f8ff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Auggie CLI</text>

  <text x="718" y="370" fill="#49d17d" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">SURFACE 3</text>
  <text x="718" y="404" fill="#f5f8ff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Intent</text>

  <text x="984" y="370" fill="#b693ff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">SUPPORTING LAYER</text>
  <text x="984" y="404" fill="#f5f8ff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">MCP extension</text>

  <path d="M206 452h778" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" opacity="0.92"/>

  <rect x="116" y="470" width="968" height="84" rx="24" fill="#0d1627" stroke="#2a3d5b"/>
  <text x="212" y="504" fill="#a9b6c8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2">SHARED MACHINERY</text>
  <text x="212" y="534" fill="#f5f8ff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Rules · tools · context</text>

  <text x="604" y="504" fill="#a9b6c8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">TEAM SHAPE</text>
  <text x="604" y="534" fill="#f5f8ff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Coordinator · implementor · verifier · UI</text>

  <text x="988" y="504" fill="#a9b6c8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="end">MODEL ROUTING</text>
  <text x="988" y="534" fill="#f5f8ff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="end">Documented where visible · cautious where inferred</text>

  <text x="600" y="579" fill="#a9b6c8" font-family="Inter, Arial, sans-serif" font-size="17" text-anchor="middle">Editable SVG source → shared as <tspan fill="#f5f8ff" font-weight="700">aug-arch-preview.png</tspan> with <tspan fill="#f5f8ff" font-weight="700">favicon_aug.svg</tspan> for page branding.</text>
</svg>
