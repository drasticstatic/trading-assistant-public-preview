<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Auto Levels Pine guide share preview</title>
  <desc id="desc">Share preview for the Auto Levels Pine guide showing a centered pine-themed title, borderless guide focus labels, and three stable cards for the level legend, settings map, and workflow cues.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="24" x2="1136" y2="608" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11291e"/>
      <stop offset="1" stop-color="#06110d"/>
    </linearGradient>
    <linearGradient id="frame" x1="112" y1="0" x2="1088" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9af3bd"/>
      <stop offset="0.45" stop-color="#52d6c7"/>
      <stop offset="1" stop-color="#f3cf7a"/>
    </linearGradient>
    <linearGradient id="cardLegend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17382a"/>
      <stop offset="1" stop-color="#10231b"/>
    </linearGradient>
    <linearGradient id="cardSettings" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12362f"/>
      <stop offset="1" stop-color="#0d221e"/>
    </linearGradient>
    <linearGradient id="cardWorkflow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f2917"/>
      <stop offset="1" stop-color="#17140d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#040c09"/>
  <rect x="28" y="28" width="1144" height="574" rx="38" fill="url(#bg)" stroke="#284b39" stroke-width="2"/>
  <circle cx="950" cy="118" r="148" fill="#52d6c7" opacity="0.12" filter="url(#glow)"/>
  <circle cx="258" cy="520" r="170" fill="#8df1b8" opacity="0.08" filter="url(#glow)"/>
  <circle cx="618" cy="90" r="118" fill="#f3cf7a" opacity="0.08" filter="url(#glow)"/>

  <text x="600" y="92" fill="#b7c9c1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3" text-anchor="middle">TRADINGVIEW · AUTO LEVELS · PINE SCRIPT GUIDE</text>
  <text x="600" y="174" fill="#f5fbf7" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800" text-anchor="middle">Auto Levels Indicator</text>
  <text x="600" y="226" fill="#8df1b8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">Instruction Manual + Chart-Reading Workflow Guide</text>
  <text x="600" y="296" fill="#d9e8df" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle">A public surface for the unified overlay's features and settings without opening the pine source</text>

  <line x1="160" y1="360" x2="1040" y2="360" stroke="#315242" stroke-width="1.5" opacity="0.9"/>
  <g font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="middle" letter-spacing="2">
    <text x="280" y="348" fill="#9af3bd">LEVEL LEGEND</text>
    <text x="486" y="348" fill="#52d6c7">SETTINGS MAP</text>
    <text x="690" y="348" fill="#b5e587">SESSION RAILS</text>
    <text x="910" y="348" fill="#f3cf7a">WORKFLOW CUES</text>
  </g>

  <rect x="84" y="388" width="300" height="172" rx="28" fill="url(#cardLegend)" stroke="#4f8a67"/>
  <rect x="450" y="388" width="300" height="172" rx="28" fill="url(#cardSettings)" stroke="#3f8b80"/>
  <rect x="816" y="388" width="300" height="172" rx="28" fill="url(#cardWorkflow)" stroke="#9a8445"/>
  <rect x="175" y="392" width="111" height="4" rx="2" fill="#9af3bd"/>
  <rect x="542" y="392" width="111" height="4" rx="2" fill="#52d6c7"/>
  <rect x="910" y="392" width="111" height="4" rx="2" fill="#f3cf7a"/>

  <text x="234" y="426" fill="#9af3bd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">LEGEND + FCR TREATMENT</text>
  <text x="234" y="464" fill="#f5fbf7" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">KEY · 5/5 → 3/5</text>
  <text x="234" y="495" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">· 4/5 Open/Close Levels</text>
  <text x="234" y="519" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">· Mitigated Ghost Levels</text>
  <line x1="130" y1="540" x2="202" y2="540" stroke="#ff8f69" stroke-width="4" stroke-linecap="round"/>
  <text x="234" y="544" fill="#dceee5" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="2" text-anchor="middle">FCR</text>
  <line x1="266" y1="540" x2="338" y2="540" stroke="#41c985" stroke-width="4" stroke-linecap="round"/>

  <text x="600" y="426" fill="#52d6c7" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">TOGGLES + OPTIONAL MODULES</text>
  <text x="600" y="464" fill="#f5fbf7" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">Display Hygiene</text>
  <text x="600" y="495" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">· Level Types + Thresholds</text>
  <text x="600" y="519" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">· Style and Visibility Control</text>
  <text x="600" y="543" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">· RTH Whitelist vs ETH Derived</text>

  <text x="966" y="426" fill="#f3cf7a" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">PRACTICAL FLOW</text>
  <text x="966" y="464" fill="#f5fbf7" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">Layered Architecture</text>
  <text x="966" y="495" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">· Bias + Session Rails</text>
  <text x="966" y="519" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">· EMA Trend Context</text>
  <text x="966" y="543" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">· FVGs + Pattern Recognition</text>

