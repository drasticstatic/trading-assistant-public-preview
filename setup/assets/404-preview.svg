      <rect x="194" y="68" width="12" height="34" rx="1.2" fill="#f85149"/>
      <line x1="225" y1="82" x2="225" y2="142" stroke="#f85149" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="219" y="96" width="12" height="26" rx="1.2" fill="#f85149"/>
      <line x1="250" y1="102" x2="250" y2="149" stroke="#8b949e" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="244" y="118" width="12" height="10" rx="1.2" fill="#8b949e"/>
      <line x1="275" y1="92" x2="275" y2="146" stroke="#3fb950" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="269" y="104" width="12" height="28" rx="1.2" fill="#3fb950"/>
      <line x1="300" y1="84" x2="300" y2="132" stroke="#3fb950" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="294" y="92" width="12" height="24" rx="1.2" fill="#3fb950"/>
      <line x1="325" y1="72" x2="325" y2="118" stroke="#f85149" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="319" y="86" width="12" height="18" rx="1.2" fill="#f85149"/>
      <line x1="350" y1="58" x2="350" y2="110" stroke="#3fb950" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="344" y="73" width="12" height="26" rx="1.2" fill="#3fb950"/>
      <line x1="375" y1="52" x2="375" y2="98" stroke="#3fb950" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="369" y="64" width="12" height="20" rx="1.2" fill="#3fb950"/>
      <line x1="400" y1="48" x2="400" y2="90" stroke="#f85149" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="394" y="58" width="12" height="16" rx="1.2" fill="#f85149"/>
      <line x1="425" y1="40" x2="425" y2="84" stroke="#3fb950" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="419" y="50" width="12" height="22" rx="1.2" fill="#3fb950"/>
      <line x1="450" y1="34" x2="450" y2="74" stroke="#3fb950" stroke-width="1.75" stroke-linecap="round"/>
