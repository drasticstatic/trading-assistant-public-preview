<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Trading Assistant 404 preview companion</title>
  <desc id="desc">Editable SVG companion for the accepted 404 preview PNG. It recreates the main composition with live text, grouped vector shapes, and a chart adapted from 404.html so Christopher can manually edit the source later without relying on a raster trace.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1218"/>
      <stop offset="100%" stop-color="#101821"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="96" y1="58" x2="1104" y2="572" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#152130"/>
      <stop offset="100%" stop-color="#0f1821"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="84" y1="150" x2="386" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="52%" stop-color="#7cc2ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="174" cy="84" r="168" fill="#7cc2ff" opacity="0.08" filter="url(#softGlow)"/>
  <circle cx="1088" cy="92" r="152" fill="#bc8cff" opacity="0.07" filter="url(#softGlow)"/>
  <circle cx="956" cy="512" r="156" fill="#3fb950" opacity="0.06" filter="url(#softGlow)"/>

  <g id="frame">
    <rect id="card" x="48" y="46" width="1104" height="538" rx="34" fill="url(#cardGlow)" stroke="#34404d" stroke-width="2"/>
    <rect x="70" y="68" width="1060" height="494" rx="28" fill="none" stroke="#1a2632"/>
  </g>

  <g id="headline" font-family="Arial, sans-serif">
    <text x="255" y="98" fill="#99a4af" font-size="17" font-weight="700" letter-spacing="4">TRADING · ASSISTANT</text>
    <text x="315" y="188" fill="url(#titleGrad)" font-size="88" font-weight="800">404</text>
    <text x="260" y="225" fill="#e3b341" font-family="SFMono-Regular, Consolas, monospace" font-size="20" font-weight="700" letter-spacing="2.4">oops... no worries</text>
  </g>

  <g id="chart-panel">
    <rect x="100" y="242" width="580" height="206" rx="26" fill="#0f1720" stroke="#334150" stroke-width="1.5"/>
    <g id="chart" transform="translate(116 258) scale(1.06 0.98)">
      <line x1="0" y1="45" x2="520" y2="45" stroke="rgba(139,148,158,0.14)" stroke-width="1"/>
      <line x1="0" y1="90" x2="520" y2="90" stroke="rgba(139,148,158,0.14)" stroke-width="1"/>
      <line x1="0" y1="135" x2="520" y2="135" stroke="rgba(139,148,158,0.14)" stroke-width="1"/>
      <rect x="60" y="60" width="50" height="25" rx="2" fill="#3fb950" opacity="0.14"/>

      <line x1="30" y1="112" x2="30" y2="56" stroke="#3fb950" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="24" y="72" width="12" height="28" rx="1.2" fill="#3fb950"/>
      <line x1="55" y1="102" x2="55" y2="46" stroke="#3fb950" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="49" y="60" width="12" height="29" rx="1.2" fill="#3fb950"/>
      <line x1="80" y1="93" x2="80" y2="38" stroke="#3fb950" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="74" y="49" width="12" height="31" rx="1.2" fill="#3fb950"/>
      <line x1="105" y1="34" x2="105" y2="88" stroke="#f85149" stroke-width="1.75" stroke-linecap="round"/>
      <rect x="99" y="46" width="12" height="24" rx="1.2" fill="#f85149"/>

      <rect x="118" y="0" width="60" height="180" fill="#e3b341" opacity="0.11"/>
      <line x1="118" y1="0" x2="118" y2="180" stroke="#e3b341" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
      <line x1="178" y1="0" x2="178" y2="180" stroke="#e3b341" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
      <text x="123" y="14" fill="#e3b341" font-family="SFMono-Regular, Consolas, monospace" font-size="11" font-weight="700">404</text>
      <text x="121" y="28" fill="#e3b341" font-family="SFMono-Regular, Consolas, monospace" font-size="8.75">page moved</text>

