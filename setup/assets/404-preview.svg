      <rect x="244" y="162" width="12" height="10" rx="1" fill="#8b949e" opacity="0.4"/>
      <rect x="269" y="154" width="12" height="18" rx="1" fill="#3fb950" opacity="0.4"/>
      <rect x="294" y="152" width="12" height="20" rx="1" fill="#3fb950" opacity="0.4"/>
      <rect x="319" y="157" width="12" height="15" rx="1" fill="#f85149" opacity="0.4"/>
      <rect x="344" y="150" width="12" height="22" rx="1" fill="#3fb950" opacity="0.4"/>
      <rect x="369" y="154" width="12" height="18" rx="1" fill="#3fb950" opacity="0.4"/>
      <rect x="394" y="156" width="12" height="16" rx="1" fill="#f85149" opacity="0.4"/>
      <rect x="419" y="150" width="12" height="22" rx="1" fill="#3fb950" opacity="0.4"/>
      <rect x="444" y="148" width="12" height="24" rx="1" fill="#3fb950" opacity="0.4"/>
