  </g>

  <g id="left-copy" font-family="Arial, sans-serif">
    <text x="140" y="490" fill="#d8dee4" font-size="32" font-weight="700">page moved during a restructure</text>
    <rect x="172" y="510" width="430" height="34" rx="17" fill="#181f2a" stroke="#e3b341" stroke-opacity="0.56"/>
    <text x="387" y="532" fill="#e8c66c" font-size="18.5" font-weight="700" text-anchor="middle">match your legacy link to the recovery link</text>
  </g>

  <g id="right-column" transform="translate(692 84)">
    <rect x="55" y="10" width="300" height="36" rx="18" fill="#16241d" stroke="#3fb950" stroke-opacity="0.7"/>
    <circle cx="85" cy="28" r="5" fill="#3fb950"/>
    <text x="105" y="34" fill="#b9f5c4" font-family="Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="1.4">RECOVERY SIGNAL LIVE</text>

    <line x1="35" y1="76" x2="376" y2="76" stroke="#334150" stroke-dasharray="5 5" opacity="0.7"/>
    <text x="40" y="130" fill="#d8dee4" font-family="Arial, sans-serif" font-size="19.5" font-weight="700">The public structure is cleaner now</text>
    <text x="60" y="170" fill="#99a4af" font-family="Arial, sans-serif" font-size="17.5">but the familiar sections are still there</text>

    <line x1="35" y1="214" x2="376" y2="214" stroke="#334150" opacity="0.78"/>
    <text x="110" y="280" fill="#99a4af" font-family="Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="3">RECOVERY-FIRST</text>
    <text x="60" y="330" fill="#d8dee4" font-family="Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="1.4">LINKS STILL IN TACT</text>

    <line x1="35" y1="380" x2="376" y2="380" stroke="#334150" stroke-dasharray="5 5" opacity="0.7"/>
    <rect x="20" y="420" width="376" height="36" rx="18" fill="#20182a" stroke="#bc8cff" stroke-opacity="0.65"/>
    <text x="208" y="443" fill="#ead7ff" font-family="SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" text-anchor="middle">smarttrader-ai/ → YYYY/MM-Mon/</text>
  </g>
