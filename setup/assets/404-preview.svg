      <path d="M0,118 C22,106 48,88 78,66 C96,54 116,56 138,64 C160,72 182,82 202,90 C220,96 236,112 252,122 C268,128 286,122 304,112 C322,102 340,90 360,82 C378,74 398,68 420,58 C438,50 460,44 520,34" fill="none" stroke="#7cc2ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M0,126 C24,120 50,108 80,92 C102,80 124,74 150,76 C172,78 194,84 218,94 C236,102 252,110 272,114 C292,116 312,110 334,102 C356,94 378,86 400,78 C422,70 446,62 520,50" fill="none" stroke="#3fb950" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>

      <rect x="24" y="156" width="12" height="16" rx="1" fill="#3fb950" opacity="0.4"/>
      <rect x="49" y="152" width="12" height="20" rx="1" fill="#3fb950" opacity="0.4"/>
      <rect x="74" y="148" width="12" height="24" rx="1" fill="#3fb950" opacity="0.4"/>
      <rect x="99" y="160" width="12" height="12" rx="1" fill="#f85149" opacity="0.4"/>
      <rect x="194" y="146" width="12" height="26" rx="1" fill="#f85149" opacity="0.4"/>
