  <path transform="translate(-875, -94)" d="M944 230 L1064 230" fill="none" stroke="#800080" stroke-linecap="round" stroke-width="4" opacity="0.4" stroke-dasharray="8, 5"/>
  <path transform="translate(-875, -58)" d="M944 230 L1064 230" fill="none" stroke="#800080" stroke-linecap="round" stroke-width="4" opacity="0.4" stroke-dasharray="8, 5"/>

  <rect x="196" y="245" width="808" height="4" rx="2" fill="url(#frame)" opacity="0.98"/>
