<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Auto Levels Pine changelog share preview</title>
  <desc id="desc">Share preview for the Auto Levels Pine changelog showing a centered release-history title, three stable summary cards, and a separate known-issues panel with wrapped text.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="24" x2="1136" y2="608" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14291f"/>
      <stop offset="1" stop-color="#08120d"/>
    </linearGradient>
    <linearGradient id="frame" x1="112" y1="0" x2="1088" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9af3bd"/>
      <stop offset="0.45" stop-color="#52d6c7"/>
      <stop offset="1" stop-color="#ff8f69"/>
    </linearGradient>
    <linearGradient id="cardCurrent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#153228"/>
      <stop offset="1" stop-color="#0f2219"/>
    </linearGradient>
    <linearGradient id="cardArchive" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#103028"/>
      <stop offset="1" stop-color="#0c211c"/>
    </linearGradient>
    <linearGradient id="cardHistory" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14291d"/>
      <stop offset="1" stop-color="#0d1d16"/>
    </linearGradient>
    <linearGradient id="cardIssues" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c2515"/>
      <stop offset="1" stop-color="#18140d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#040b08"/>
  <rect x="28" y="28" width="1144" height="574" rx="38" fill="url(#bg)" stroke="#294a39" stroke-width="2"/>
  <circle cx="220" cy="130" r="138" fill="#8df1b8" opacity="0.1" filter="url(#glow)"/>
  <circle cx="968" cy="500" r="164" fill="#52d6c7" opacity="0.08" filter="url(#glow)"/>
  <circle cx="924" cy="122" r="132" fill="#ff8f69" opacity="0.08" filter="url(#glow)"/>

  <text x="600" y="92" fill="#b7c9c1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3" text-anchor="middle">TRADINGVIEW SCRIPT · AUTO LEVELS · RELEASE HISTORY</text>
  <text x="600" y="174" fill="#f5fbf7" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800" text-anchor="middle">Auto Levels  ·  Changelog</text>
  <text x="600" y="226" fill="#52d6c7" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">Version Detail · Boundaries · Live-Validation · Feedback</text>
  <text x="600" y="291" fill="#d9e8df" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle">A conservative public revision surface serving changes, source-landed updates,</text>
  <text x="600" y="326" fill="#d9e8df" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle">and pending validations - ensuring the main guide remains accurate and uncluttered</text>

  <line x1="248" y1="348" x2="952" y2="348" stroke="#325244" stroke-width="1.5" opacity="0.9"/>

  <rect x="84" y="378" width="250" height="178" rx="28" fill="url(#cardCurrent)" stroke="#4d8c69"/>
  <rect x="364" y="378" width="250" height="178" rx="28" fill="url(#cardArchive)" stroke="#3e887e"/>
  <rect x="644" y="378" width="250" height="178" rx="28" fill="url(#cardHistory)" stroke="#6a9e66"/>
  <rect x="914" y="378" width="202" height="178" rx="30" fill="url(#cardIssues)" stroke="#9a8445"/>
  <rect x="155" y="382" width="111" height="4" rx="2" fill="#9af3bd"/>
  <rect x="434" y="382" width="111" height="4" rx="2" fill="#52d6c7"/>
  <rect x="714" y="382" width="111" height="4" rx="2" fill="#b5e587"/>
  <rect x="973" y="382" width="88" height="4" rx="2" fill="#f3cf7a"/>

  <text x="211" y="418" fill="#9af3bd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">CURRENT BASELINE</text>
  <text x="211" y="458" fill="#f5fbf7" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" text-anchor="middle">Recent Release</text>
  <text x="211" y="488" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Active Source Snapshot</text>
  <text x="211" y="516" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Improvements Publicly Visible</text>
  <text x="211" y="544" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">See Guide 4 Setup/Workflow</text>

  <text x="491" y="418" fill="#52d6c7" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">REVISION TRAIL</text>
  <text x="491" y="458" fill="#f5fbf7" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">Version #.#</text>
  <text x="491" y="488" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Source Change Milestones</text>
  <text x="491" y="516" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Bug-trail + Tweaks Context</text>
  <text x="491" y="544" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">History Stays Trader-Facing</text>

  <text x="771" y="418" fill="#c8e88f" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">FOUNDATION</text>
  <text x="771" y="458" fill="#f5fbf7" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">Indicator Family</text>
  <text x="771" y="488" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">DetectionRoots + Methodology</text>
  <text x="771" y="516" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">User Customization</text>
  <text x="771" y="544" fill="#cfe0d8" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Companions + Recognition</text>

  <text x="1017" y="418" fill="#f3cf7a" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2" text-anchor="middle">KNOWN ISSUES</text>
  <text x="1017" y="458" fill="#f5fbf7" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">Case Status</text>
  <text x="1017" y="485" fill="#d7d4ca" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">Open Live Review w/</text>
  <text x="1017" y="503" fill="#d7d4ca" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">On-Chart Confirmation</text>
  <text x="1017" y="528" fill="#d7d4ca" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">Implemented in Source</text>
  <text x="1017" y="546" fill="#d7d4ca" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">≠ Closed Case</text>

